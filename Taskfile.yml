version: '3'

silent: false

env:
  GOFLAGS: -mod=mod

tasks:
  default:
    desc: List available Noema local tasks.
    cmds:
      - task --list

  go:test:
    desc: Run native Go API skeleton tests.
    dir: .
    cmds:
      - go test ./services/api/...

  go:fmt:
    desc: Format native Go API skeleton files.
    dir: .
    cmds:
      - gofmt -w $(find services/api -name '*.go' -type f | sort)

  api:smoke:
    desc: Build the native Go API to /tmp, start it locally, verify /healthz, /search, /legacy-import/preview, and /legacy-import/batch-preview, then clean up.
    dir: .
    cmds:
      - python scripts/noema_api_smoke.py

  k8s:render:
    desc: Render Kubernetes PoC manifests locally; never applies them.
    dir: .
    cmds:
      - |
        set -euo pipefail
        kubectl kustomize deploy/k8s/base >/tmp/noema-rendered.yaml
        grep -nE 'kind: Namespace|kind: Deployment|kind: Job|kind: Service|noema' /tmp/noema-rendered.yaml

  compose:config:
    desc: Validate the native Noema Docker Compose environment without starting services.
    dir: .
    cmds:
      - docker compose -f compose.noema.yml --profile api --profile search config >/tmp/noema-compose-config.yaml
      - grep -nE 'noema-native|noema-api|pgvector|redis|elasticsearch' /tmp/noema-compose-config.yaml

  compose:up:
    desc: Start the native Noema API compose profile on localhost only.
    dir: .
    cmds:
      - |
        set -euo pipefail
        export VCS_REF=$(git rev-parse --short HEAD)
        if [ -z "${NOEMA_API_PORT:-}" ]; then
          export NOEMA_API_PORT=$(python - <<'PY'
        import socket
        for port in range(19093, 19150):
            sock = socket.socket()
            try:
                sock.bind(('127.0.0.1', port))
            except OSError:
                sock.close()
                continue
            sock.close()
            print(port)
            break
        else:
            raise SystemExit('no free localhost port found for compose api')
        PY
        )
        fi
        echo "starting compose native api on 127.0.0.1:${NOEMA_API_PORT}"
        docker compose -f compose.noema.yml --profile api up -d --build

  compose:down:
    desc: Stop the native Noema compose environment and leave named volumes intact.
    dir: .
    cmds:
      - docker compose -f compose.noema.yml --profile api --profile search down --remove-orphans

  container:api-build:
    desc: Build the native Noema API container image locally.
    dir: .
    vars:
      IMAGE: '{{default "ghcr.io/agentwego/noema-api" .NOEMA_API_IMAGE}}'
      TAG:
        sh: git rev-parse --short HEAD
    cmds:
      - docker build -f services/api/Dockerfile --target runtime --build-arg VCS_REF={{.TAG}} -t {{.IMAGE}}:sha-{{.TAG}} .

  container:api-smoke:
    desc: Run the locally built native Noema API image and verify /healthz through Docker.
    dir: .
    vars:
      IMAGE: '{{default "ghcr.io/agentwego/noema-api" .NOEMA_API_IMAGE}}'
      TAG:
        sh: git rev-parse --short HEAD
    cmds:
      - |
        set -euo pipefail
        name="noema-api-smoke-$(date +%s)-$$"
        cleanup() { docker rm -f "$name" >/dev/null 2>&1 || true; }
        trap cleanup EXIT
        docker run -d --name "$name" -e NOEMA_ENV=development -e PORT=8080 -p 127.0.0.1::8080 {{.IMAGE}}:sha-{{.TAG}} >/dev/null
        port=$(docker port "$name" 8080/tcp | sed -E 's/.*:([0-9]+)$/\1/')
        for i in $(seq 1 30); do
          if curl -fsS "http://127.0.0.1:${port}/healthz" | grep -q 'noema-api'; then
            echo "container api smoke ok port=${port} image={{.IMAGE}}:sha-{{.TAG}}"
            exit 0
          fi
          sleep 1
        done
        docker logs "$name"
        exit 1

  ci:workflow-lint:
    desc: Parse GitHub Actions workflow YAML locally.
    dir: .
    cmds:
      - |
        python - <<'PY'
        import yaml
        from pathlib import Path
        for path in sorted(Path('.github/workflows').glob('*.yml')):
            with path.open() as handle:
                yaml.safe_load(handle)
            print('workflow yaml ok', path)
        PY

  search:manifest:
    desc: Render the native search index manifest locally to /tmp; never contacts Elasticsearch.
    dir: .
    cmds:
      - |
        set -euo pipefail
        go run ./services/api/cmd/search-manifest -prefix noema -version v1 -analyzer ngram >/tmp/noema-search-index-manifest.json
        python - <<'PY'
        import json
        from pathlib import Path
        payload = json.loads(Path('/tmp/noema-search-index-manifest.json').read_text())
        assert payload['schema_version'] == 'noema.search.index-manifest/v1'
        assert [i['document_family'] for i in payload['indexes']] == ['articles', 'comments', 'users', 'tags']
        print('search manifest ok', len(payload['indexes']))
        PY

  search:bootstrap-plan:
    desc: Render the native search bootstrap plan locally to /tmp; never contacts Elasticsearch.
    dir: .
    cmds:
      - |
        set -euo pipefail
        go run ./services/api/cmd/search-bootstrap-plan -prefix noema -version v1 -analyzer ngram >/tmp/noema-search-bootstrap-plan.json
        python - <<'PY'
        import json
        from pathlib import Path
        payload = json.loads(Path('/tmp/noema-search-bootstrap-plan.json').read_text())
        assert payload['schema_version'] == 'noema.search.bootstrap-plan/v1'
        assert payload['safety'] == 'review-only'
        assert len(payload['manifest']['indexes']) == 4
        assert len(payload['steps']) == 12
        assert payload['steps'][0]['action'] == 'create_index'
        assert payload['steps'][-1]['action'] == 'point_write_alias'
        print('search bootstrap plan ok', len(payload['steps']))
        PY

  search:rollback-plan:
    desc: Render the native search rollback plan locally to /tmp; never contacts Elasticsearch.
    dir: .
    cmds:
      - |
        set -euo pipefail
        go run ./services/api/cmd/search-rollback-plan -prefix noema -version v1 -analyzer ngram >/tmp/noema-search-rollback-plan.json
        python - <<'PY'
        import json
        from pathlib import Path
        payload = json.loads(Path('/tmp/noema-search-rollback-plan.json').read_text())
        assert payload['schema_version'] == 'noema.search.rollback-plan/v1'
        assert payload['safety'] == 'review-only'
        assert len(payload['manifest']['indexes']) == 4
        assert len(payload['steps']) == 12
        assert payload['steps'][0]['action'] == 'remove_write_alias'
        assert payload['steps'][-1]['action'] == 'delete_index'
        print('search rollback plan ok', len(payload['steps']))
        PY

  search:adapter-test:
    desc: Run the local mock-transport Elasticsearch adapter/client contract tests; never contacts a cluster.
    dir: .
    cmds:
      - go test ./services/api/internal/search/elastic -run 'TestElasticsearchProvider' -count=1

  persistence:test:
    desc: Run native persistence seam tests against a disposable local PostgreSQL database when NOEMA_TEST_DATABASE_URL is set.
    dir: .
    cmds:
      - go test ./services/api/internal/config ./services/api/internal/persistence -count=1

  legacyimport:test:
    desc: Run local Forem article/user to Noema clean domain DTO mapping tests; never reads an external DB.
    dir: .
    cmds:
      - go test ./services/api/internal/legacyimport -count=1

  identity:test:
    desc: Run local Ory Kratos identity/session boundary DTO tests; never contacts Kratos.
    dir: .
    cmds:
      - go test ./services/api/internal/identity -count=1

  import:preview-test:
    desc: Run local legacy import preview service/API tests; never writes DB/search or contacts Kratos.
    dir: .
    cmds:
      - GOFLAGS=-mod=mod go test ./services/api/internal/identity ./services/api/internal/legacyimport ./services/api/internal/http -run 'TestLocalKratosAdapter|TestPreviewService|TestRouterLegacyImportPreview' -count=1 -v

  import:identity-preview-test:
    desc: Run local legacy user identity preview and Kratos return_to mapping tests; never contacts Kratos.
    dir: .
    cmds:
      - GOFLAGS=-mod=mod go test ./services/api/internal/identity ./services/api/internal/legacyimport ./services/api/internal/http -run 'TestLocalKratosAdapterPreviewsIdentitySessionAndSelfServiceFlows|TestPreviewServiceBuildsLocalImportPlanFromFixture|TestPreviewServiceBuildsIdentityOnlyPreviewWithReturnToOperationPlans|TestRouterLegacyImportIdentityPreviewBuildsLocalPlanWithoutExternalDependencies' -count=1 -v

  import:batch-preview-test:
    desc: Run local legacy import batch preview and Kratos operation-plan tests; never writes DB/search or contacts Kratos.
    dir: .
    cmds:
      - GOFLAGS=-mod=mod go test ./services/api/internal/identity ./services/api/internal/legacyimport ./services/api/internal/http -run 'TestLocalKratosAdapterBuildsReviewOnlyOperationPlans|TestLocalKratosAdapterRejectsSensitiveOperationPlanInput|TestPreviewServiceBuildsBatchWithPerItemErrorsAndOperationPlans|TestPreviewServiceRejectsEmptyBatch|TestRouterLegacyImportBatchPreview' -count=1 -v

  agentwego:gates:
    desc: Run local agentwego control-plane gate checks without touching production.
    dir: .
    cmds:
      - |
        set -euo pipefail
        python -c "import csv; files=list(csv.DictReader(open('docs/agentwego/noema-file-migration-inventory.csv'))); assert len(files)==5900; assert any(r['file']=='app/models/article.rb' for r in files); assert any(r['file']=='app/controllers/search_controller.rb' for r in files); assert any(r['file']=='config/routes.rb' for r in files); print('inventory ok', len(files))"
        test -s docs/agentwego/noema-file-dependency-edges.csv
        test -s docs/agentwego/noema-domain-dependency-summary.csv
        test -s docs/agentwego/noema-model-dependency-map.csv
        test -s docs/agentwego/noema-controller-map.csv
        test -s docs/agentwego/noema-worker-map.csv
        test -s docs/agentwego/database-bootstrap.md
        test -s docs/agentwego/s3-compatibility.md
        test -s docs/agentwego/search-architecture.md
        test -s docs/agentwego/native-stack-skeleton.md
        test -s docs/agentwego/local-verification-entrypoints.md
        test -s docs/agentwego/search-index-spec.md
        test -s scripts/noema_api_smoke.py
        python - <<'PY'
        import py_compile
        py_compile.compile('scripts/noema_api_smoke.py', cfile='/tmp/noema_api_smoke.pyc', doraise=True)
        PY
        grep -nE 'rollback|CNPG|noema|Secret' docs/agentwego/database-bootstrap.md
        grep -nE 'AWS_ENDPOINT_URL|AWS_FORCE_PATH_STYLE|S3-compatible' docs/agentwego/s3-compatibility.md
        grep -nE 'Elasticsearch|alias|analyzer|fallback|reindex' docs/agentwego/search-architecture.md
        grep -nE 'M0-T7|go test ./services/api|healthz' docs/agentwego/execution-board.md docs/agentwego/native-stack-skeleton.md
        grep -nE 'M0-T8|task verify:local|task --list|kind: Deployment' docs/agentwego/execution-board.md docs/agentwego/local-verification-entrypoints.md
        grep -nE 'M0-T9|AnalyzerNGram|AnalyzerIK|go test ./services/api/internal/search/elastic' docs/agentwego/execution-board.md docs/agentwego/search-index-spec.md
        grep -nE 'M0-T10|AllIndexSpecs|CommentIndexSpec|UserIndexSpec|TagIndexSpec' docs/agentwego/execution-board.md docs/agentwego/search-index-spec.md
        grep -nE 'M0-T11|search-manifest|ManifestJSON|schema_version' docs/agentwego/execution-board.md docs/agentwego/search-index-spec.md
        grep -nE 'M0-T12|ValidateManifest|duplicate index_name|dynamic must be strict' docs/agentwego/execution-board.md docs/agentwego/search-index-spec.md
        grep -nE 'M0-T13|BuildBootstrapPlan|search-bootstrap-plan|review-only' docs/agentwego/execution-board.md docs/agentwego/search-index-spec.md docs/agentwego/local-verification-entrypoints.md
        grep -nE 'M0-T14|NewProvider|ErrReadOnly|fallback/postgres' docs/agentwego/execution-board.md docs/agentwego/search-architecture.md docs/agentwego/native-stack-skeleton.md
        grep -nE 'M0-T15|BuildRollbackPlan|search-rollback-plan|remove_write_alias' docs/agentwego/execution-board.md docs/agentwego/search-index-spec.md docs/agentwego/local-verification-entrypoints.md
        grep -nE 'M0-T16|NormalizeSearchRequest|DefaultSearchLimit|MaxSearchLimit' docs/agentwego/execution-board.md docs/agentwego/search-architecture.md docs/agentwego/native-stack-skeleton.md
        grep -nE 'M0-T17|GET /search|invalid limit|provider, query, limit, hits' docs/agentwego/execution-board.md docs/agentwego/search-architecture.md docs/agentwego/native-stack-skeleton.md docs/agentwego/local-verification-entrypoints.md
        grep -nE 'M0-T18|method not allowed|search unavailable|backend error details' docs/agentwego/execution-board.md docs/agentwego/search-architecture.md
        grep -nE 'M0-T19|Provider.Name\(\)|actual injected provider|actual provider identity' docs/agentwego/execution-board.md docs/agentwego/search-architecture.md docs/agentwego/native-stack-skeleton.md
        grep -nE 'M0-T20|invalid limit|method not allowed|JSON error paths' docs/agentwego/execution-board.md docs/agentwego/local-verification-entrypoints.md scripts/noema_api_smoke.py
        grep -nE 'M0-T21|buildSearchProvider|falling back to noop|unknown-provider|does-not-exist' docs/agentwego/execution-board.md docs/agentwego/search-architecture.md docs/agentwego/native-stack-skeleton.md docs/agentwego/local-verification-entrypoints.md scripts/noema_api_smoke.py
        grep -nE 'M0-T22|local/test|fail fast|fallback safety boundary|allowSearchProviderFallback' docs/agentwego/execution-board.md docs/agentwego/search-architecture.md docs/agentwego/native-stack-skeleton.md services/api/cmd/api/main.go
        grep -nE 'M0-T23|missing query|empty-query|blank query' docs/agentwego/execution-board.md docs/agentwego/search-architecture.md docs/agentwego/local-verification-entrypoints.md scripts/noema_api_smoke.py services/api/internal/http/router.go
        grep -nE 'M0-T24|not found|unknown-route|notFoundHandler' docs/agentwego/execution-board.md docs/agentwego/search-architecture.md docs/agentwego/native-stack-skeleton.md docs/agentwego/local-verification-entrypoints.md scripts/noema_api_smoke.py services/api/internal/http/router.go
        grep -nE 'M0-T25|/healthz unsupported-method|health method|POST /healthz' docs/agentwego/execution-board.md docs/agentwego/search-architecture.md docs/agentwego/native-stack-skeleton.md docs/agentwego/local-verification-entrypoints.md scripts/noema_api_smoke.py services/api/internal/http/router_test.go
        grep -nE 'M0-T28|NOEMA_DATABASE_URL|persistence:test|GORMRepository|Article.*User|native persistence' docs/agentwego/execution-board.md docs/agentwego/native-stack-skeleton.md docs/agentwego/local-verification-entrypoints.md services/api/internal/config/config.go services/api/internal/persistence/repository_test.go
        grep -nE 'M0-T29|search:adapter-test|mockable transport|explicit transport|BulkIndex|EnsureIndexes|noema-articles-write' docs/agentwego/execution-board.md docs/agentwego/search-architecture.md docs/agentwego/search-index-spec.md docs/agentwego/local-verification-entrypoints.md services/api/internal/search/elastic/client.go services/api/internal/search/elastic/client_test.go
        grep -nE 'M0-T30|legacyimport:test|Forem article/user|MapForemArticle|MapForemUser|clean domain DTO' docs/agentwego/execution-board.md docs/agentwego/legacy-import-boundary.md docs/agentwego/local-verification-entrypoints.md services/api/internal/legacyimport/forem.go services/api/internal/legacyimport/forem_test.go
        grep -nE 'M0-T31|identity:test|Ory Kratos|KratosIdentityImport|MapForemUserIdentity|self-service flow' docs/agentwego/execution-board.md docs/agentwego/legacy-import-boundary.md docs/agentwego/identity-options.md docs/agentwego/local-verification-entrypoints.md services/api/internal/identity/kratos.go services/api/internal/legacyimport/identity.go
        grep -nE 'M0-T32|BuildForemArticleUserIdentityBundle|ArticleUserIdentityBundle|ForemArticleUserIdentityImport|Kratos boundary' docs/agentwego/execution-board.md docs/agentwego/legacy-import-boundary.md docs/agentwego/identity-options.md docs/agentwego/local-verification-entrypoints.md services/api/internal/legacyimport/bundle.go services/api/internal/legacyimport/bundle_test.go
        grep -nE 'M0-T33|explicit Forem user|AcceptsExplicitForemUser|User.*ForemUser|Ory Kratos identity mapping' docs/agentwego/execution-board.md docs/agentwego/legacy-import-boundary.md docs/agentwego/identity-options.md docs/agentwego/local-verification-entrypoints.md services/api/internal/legacyimport/bundle.go services/api/internal/legacyimport/bundle_test.go
        grep -nE 'M0-T34|import:preview-test|/legacy-import/preview|PreviewForemArticleUserIdentity|NewLocalKratosAdapter|KratosTargetAdapter|self-service flow|none-local-preview-only' docs/agentwego/execution-board.md docs/agentwego/legacy-import-boundary.md docs/agentwego/identity-options.md docs/agentwego/local-verification-entrypoints.md services/api/internal/legacyimport/service.go services/api/internal/identity/adapter.go services/api/internal/http/router.go scripts/noema_api_smoke.py
        grep -nE 'M0-T35|import:batch-preview-test|/legacy-import/batch-preview|PreviewForemArticleUserIdentityBatch|ImportBatchPreview|KratosOperationPlan|operation_plans|review-only|none-local-preview-only' docs/agentwego/execution-board.md docs/agentwego/legacy-import-boundary.md docs/agentwego/identity-options.md docs/agentwego/local-verification-entrypoints.md services/api/internal/legacyimport/service.go services/api/internal/identity/operation_plan.go services/api/internal/http/router.go scripts/noema_api_smoke.py
        grep -nE 'M0-T36|go 1\.26|go1\.26|Go module baseline' docs/agentwego/execution-board.md docs/agentwego/native-stack-skeleton.md go.mod
        grep -nE 'M0-T37|compose\.noema\.yml|container:api-build|noema-native|infra/docker-compose-ci' docs/agentwego/execution-board.md docs/agentwego/native-stack-skeleton.md docs/agentwego/local-verification-entrypoints.md Taskfile.yml .github/workflows/noema-native.yml
        grep -nE 'M0-T38|import:identity-preview-test|/legacy-import/identity-preview|PreviewForemUserIdentity|kratos_return_to|return_to=https|RequestURL|identity-preview/v1' docs/agentwego/execution-board.md docs/agentwego/legacy-import-boundary.md docs/agentwego/identity-options.md docs/agentwego/local-verification-entrypoints.md Taskfile.yml services/api/internal/legacyimport/service.go services/api/internal/identity/adapter.go services/api/internal/http/router.go scripts/noema_api_smoke.py

  verify:local:
    desc: Run low-risk local verification for the current Noema M0 slices.
    cmds:
      - task: go:fmt
      - task: go:test
      - task: search:adapter-test
      - task: persistence:test
      - task: legacyimport:test
      - task: identity:test
      - task: import:preview-test
      - task: import:identity-preview-test
      - task: import:batch-preview-test
      - task: compose:config
      - task: ci:workflow-lint
      - task: search:manifest
      - task: search:bootstrap-plan
      - task: search:rollback-plan
      - task: api:smoke
      - task: agentwego:gates
      - task: k8s:render
      - git diff --check
