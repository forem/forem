apiVersion: v1
kind: ConfigMap
metadata:
  name: noema-runtime-config
  namespace: noema
  labels:
    app.kubernetes.io/name: noema
    app.kubernetes.io/part-of: noema
data:
  PORT: "3000"
  RAILS_ENV: production
  NODE_ENV: production
  RAILS_SERVE_STATIC_FILES: "true"
  APP_PROTOCOL: https://
  APP_DOMAIN: noema.agentwego.com
  COMMUNITY_NAME: Noema
  DEFAULT_EMAIL: no-reply@example.invalid
  FORCE_SSL_IN_RAILS: "true"
  SKIP_FASTLY_CONFIG_UPDATE: "true"
  FILE_STORAGE_LOCATION: fog
  AWS_DEFAULT_REGION: ap-southeast-1
  AWS_UPLOAD_REGION: ap-southeast-1
  AWS_ENDPOINT_URL: https://s3.example.invalid
  AWS_FORCE_PATH_STYLE: "true"
  WEB_CONCURRENCY: "1"
  RAILS_MAX_THREADS: "5"
  MALLOC_ARENA_MAX: "2"
