name: Noema Native API

on:
  push:
    branches:
      - main
      - 'infra/**'
      - 'feature/**'
      - 'spike/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  packages: write

env:
  GOFLAGS: -mod=mod
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/noema-api

jobs:
  go-test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Test native API packages
        run: go test ./services/api/...

  compose-and-image:
    name: Compose config and container build
    runs-on: ubuntu-latest
    needs: [go-test]
    steps:
      - uses: actions/checkout@v6
      - name: Validate native compose file
        run: docker compose -f compose.noema.yml --profile api --profile search config >/tmp/noema-compose-config.yaml
      - uses: docker/setup-buildx-action@v3
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api/Dockerfile
          target: runtime
          build-args: |
            VCS_REF=${{ github.sha }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
